version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pfm-postgres
    restart: always
    environment:
      POSTGRES_USER: pfm_user
      POSTGRES_PASSWORD: pfm_secure_password123
      POSTGRES_DB: personal_finance
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
